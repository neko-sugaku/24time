<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24時間時計の練習アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="body-bg" class="bg-blue-50 font-sans select-none transition-colors duration-500">

  <div class="min-h-screen flex flex-col items-center justify-center p-4">
    
    <!-- 問題画面 -->
    <div id="game-screen" class="bg-white rounded-3xl shadow-xl w-full max-w-2xl p-6 sm:p-10 relative overflow-hidden border-4 border-blue-100">
      
      <!-- 正解・不正解のオーバーレイ（初期は非表示） -->
      <div id="overlay-correct" class="hidden absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center">
        <svg viewBox="0 0 100 100" class="w-64 h-64 text-red-500 animate-bounce">
          <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="10" fill="none" />
        </svg>
        <p class="text-5xl font-bold text-red-500 mt-6 tracking-widest">せいかい！</p>
      </div>

      <div id="overlay-incorrect" class="hidden absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center">
        <svg viewBox="0 0 100 100" class="w-64 h-64 text-blue-500">
          <path d="M 30 30 L 70 70 M 70 30 L 30 70" stroke="currentColor" stroke-width="12" stroke-linecap="round" />
        </svg>
        <p class="text-4xl font-bold text-blue-500 mt-6 tracking-widest">もういちど</p>
      </div>

      <!-- ヘッダー領域 -->
      <div id="progress-text" class="text-2xl text-gray-500 mb-6 font-bold text-center bg-gray-100 py-2 rounded-full w-48 mx-auto">
        <!-- JSで挿入 -->
      </div>

      <!-- 問題文 -->
      <div class="text-2xl sm:text-3xl text-center mb-8 font-bold text-gray-800 tracking-wide">
        24<ruby>時間<rt class="text-sm text-gray-500">じかん</rt></ruby><ruby>表記<rt class="text-sm text-gray-500">ひょうき</rt></ruby>で<ruby>答<rt class="text-sm text-gray-500">こた</rt></ruby>えなさい。
      </div>

      <!-- 出題時刻の表示 -->
      <div id="question-time" class="text-5xl sm:text-6xl text-center mb-10 font-black text-blue-600 bg-blue-50 py-6 rounded-2xl border-2 border-blue-200">
        <!-- JSで挿入 -->
      </div>

      <!-- 解答欄 -->
      <div class="flex justify-center items-end gap-3 mb-10">
        <input
          id="answer-input"
          type="text"
          inputmode="numeric"
          pattern="\d*"
          placeholder="-"
          class="w-32 h-24 text-5xl text-center border-4 border-gray-300 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-200 focus:outline-none transition-all shadow-inner font-bold text-gray-800"
        />
        <span class="text-4xl font-bold text-gray-700 pb-4"><ruby>時<rt class="text-sm text-gray-500">じ</rt></ruby></span>
      </div>

      <!-- ソフトウェアテンキー（タブレット・タッチパネル向け） -->
      <div id="numpad" class="grid grid-cols-3 gap-3 max-w-[320px] mx-auto">
        <!-- JSで生成 -->
      </div>

    </div>

    <!-- 全問終了時の画面（初期は非表示） -->
    <div id="finish-screen" class="hidden bg-white rounded-3xl shadow-xl w-full max-w-2xl p-12 text-center border-4 border-green-200">
      <h1 class="text-5xl font-bold text-red-500 mb-8 tracking-wider">よくできました！</h1>
      <p class="text-2xl text-gray-700 mb-12 font-medium">10もん ぜんぶ おわりました。</p>
      <button
        id="btn-restart"
        class="bg-blue-500 hover:bg-blue-600 text-white font-bold text-2xl py-5 px-10 rounded-2xl shadow-lg transition-transform active:scale-95"
      >
        もういちど やる
      </button>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 状態管理
      let questions = [];
      let currentIndex = 0;
      let inputValue = '';
      let isWaiting = false; // アニメーション中の入力ブロック用

      // DOM要素の取得
      const elBodyBg = document.getElementById('body-bg');
      const elGameScreen = document.getElementById('game-screen');
      const elFinishScreen = document.getElementById('finish-screen');
      const elOverlayCorrect = document.getElementById('overlay-correct');
      const elOverlayIncorrect = document.getElementById('overlay-incorrect');
      const elProgressText = document.getElementById('progress-text');
      const elQuestionTime = document.getElementById('question-time');
      const elInput = document.getElementById('answer-input');
      const elNumpad = document.getElementById('numpad');
      const btnRestart = document.getElementById('btn-restart');

      // 問題生成関数
      function generateQuestions() {
        const q = [];
        let lastId = '';
        
        while (q.length < 10) {
          const isAm = Math.random() < 0.5;
          // 0〜12のランダムな数字
          const hour = Math.floor(Math.random() * 13);
          const id = `${isAm ? 'am' : 'pm'}-${hour}`;
          
          if (id !== lastId) {
            // 午前0〜12時はそのまま、午後0〜12時は+12
            const answer = isAm ? hour : hour + 12;
            
            q.push({
              period: isAm ? '午前' : '午後',
              periodKana: isAm ? 'ごぜん' : 'ごご',
              hour: hour,
              answer: answer
            });
            lastId = id;
          }
        }
        return q;
      }

      // テンキーの生成とイベント登録
      function renderNumpad() {
        const btnClass = "bg-gray-100 hover:bg-gray-200 text-3xl font-bold py-4 rounded-2xl shadow-sm active:bg-gray-300 transition-colors border-2 border-gray-200";
        let html = '';
        
        for (let i = 1; i <= 9; i++) {
          html += `<button type="button" class="${btnClass} num-btn" data-num="${i}">${i}</button>`;
        }
        html += `<button type="button" class="${btnClass} text-red-500 text-2xl tracking-widest" id="btn-clear">けす</button>`;
        html += `<button type="button" class="${btnClass} num-btn" data-num="0">0</button>`;
        html += `<button type="button" id="btn-submit" class="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-4 rounded-2xl shadow-md active:bg-blue-700 transition-colors border-2 border-blue-600 tracking-widest">こたえる</button>`;
        
        elNumpad.innerHTML = html;

        document.querySelectorAll('.num-btn').forEach(btn => {
          btn.addEventListener('click', (e) => handlePadInput(e.target.dataset.num));
        });
        document.getElementById('btn-clear').addEventListener('click', handlePadClear);
        document.getElementById('btn-submit').addEventListener('click', handleSubmit);
      }

      // 画面の更新
      function updateUI() {
        const currentQ = questions[currentIndex];
        elProgressText.innerText = `だい ${currentIndex + 1} もん / 10`;
        elQuestionTime.innerHTML = `
          <ruby>${currentQ.period}<rt class="text-sm text-gray-500">${currentQ.periodKana}</rt></ruby>
          ${currentQ.hour}
          <ruby>時<rt class="text-sm text-gray-500">じ</rt></ruby>
        `;
        elInput.value = inputValue;
        if (!isWaiting) elInput.focus();
      }

      // テンキーからの入力
      function handlePadInput(num) {
        if (isWaiting) return;
        if (inputValue.length < 2) {
          inputValue += num;
          elInput.value = inputValue;
        }
        elInput.focus();
      }

      // 入力のクリア
      function handlePadClear() {
        if (isWaiting) return;
        inputValue = '';
        elInput.value = inputValue;
        elInput.focus();
      }

      // 答え合わせの処理
      function handleSubmit() {
        if (inputValue === '' || isWaiting) return;
        
        isWaiting = true;
        const currentQ = questions[currentIndex];
        
        if (parseInt(inputValue, 10) === currentQ.answer) {
          // 正解の処理
          elOverlayCorrect.classList.remove('hidden');
          elInput.blur();
          
          setTimeout(() => {
            elOverlayCorrect.classList.add('hidden');
            isWaiting = false;
            
            if (currentIndex < 9) {
              currentIndex++;
              inputValue = '';
              updateUI();
            } else {
              showFinishScreen();
            }
          }, 1500);
        } else {
          // 不正解の処理
          elOverlayIncorrect.classList.remove('hidden');
          elInput.blur();
          
          setTimeout(() => {
            elOverlayIncorrect.classList.add('hidden');
            inputValue = '';
            elInput.value = inputValue;
            isWaiting = false;
            elInput.focus();
          }, 1500);
        }
      }

      // 終了画面の表示
      function showFinishScreen() {
        elGameScreen.classList.add('hidden');
        elFinishScreen.classList.remove('hidden');
        elBodyBg.classList.replace('bg-blue-50', 'bg-green-50');
      }

      // ゲームのリセット（最初から）
      function restartGame() {
        questions = generateQuestions();
        currentIndex = 0;
        inputValue = '';
        isWaiting = false;
        
        elGameScreen.classList.remove('hidden');
        elFinishScreen.classList.add('hidden');
        if (elBodyBg.classList.contains('bg-green-50')) {
          elBodyBg.classList.replace('bg-green-50', 'bg-blue-50');
        }
        
        updateUI();
      }

      // 物理キーボードの入力制御
      elInput.addEventListener('input', (e) => {
        if (isWaiting) {
          elInput.value = inputValue;
          return;
        }
        const val = e.target.value;
        if (/^\d*$/.test(val) && val.length <= 2) {
          inputValue = val;
        } else {
          elInput.value = inputValue; // 数字2桁以外は元に戻す
        }
      });

      // エンターキーでの判定
      elInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          handleSubmit();
        }
      });

      btnRestart.addEventListener('click', restartGame);

      // アプリの初期化
      renderNumpad();
      restartGame();
    });
  </script>
</body>
</html>
